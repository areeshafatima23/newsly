
name: newsly
description: A personalized news app with audio playback and AI chatbot.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # Audio Playback
  flutter_tts: ^4.0.2

  # UI Components
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0

  # AI Chatbot (Gemini or OpenAI)
  google_generative_ai: ^0.4.3

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/

